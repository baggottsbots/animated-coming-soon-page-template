<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <script src="https://cdn.tailwindcss.com"></script>
    

<!-- SEO Meta Tags -->
<title>Exciting Animated Coming Soon Page Designs</title>
<meta name="description" content="Capture leads and engage your audience before you launch with a stunning animated coming soon page. Professional designs available now." />
<meta name="keywords" content="animated coming soon page" />
<meta property="og:title" content="Exciting Animated Coming Soon Page Designs" />
<meta property="og:description" content="Capture leads and engage your audience before you launch with a stunning animated coming soon page. Professional designs available now." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Exciting Animated Coming Soon Page Designs" />
<meta name="twitter:description" content="Capture leads and engage your audience before you launch with a stunning animated coming soon page. Professional designs available now." />
<!-- End SEO Meta Tags -->


  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center overflow-hidden">
    <!-- Floating Orb Animation -->
    <div class="absolute top-20 right-20 w-64 h-64 bg-blue-500 rounded-full floating-orb glow blur-3xl"></div>
    
    <!-- Content -->
    <div class="relative z-10 max-w-2xl mx-auto px-6 text-center">
        <!-- Main Heading -->
        <h1 class="text-6xl md:text-7xl font-black text-white mb-6 tracking-tight">
            Coming Soon
        </h1>

        <!-- Subheading -->
        <p class="text-xl md:text-2xl text-blue-200 mb-12 font-light">
            Something extraordinary is in the works. We're crafting magic behind the scenes.
        </p>

        <!-- Countdown Timer -->
        <div class="mb-16 flex justify-center gap-8 md:gap-12">
            <div class="text-center">
                <div class="countdown-digit" id="days">00</div>
                <p class="text-sm text-blue-300 uppercase tracking-widest mt-2">Days</p>
            </div>
            <div class="text-center">
                <div class="countdown-digit" id="hours">00</div>
                <p class="text-sm text-blue-300 uppercase tracking-widest mt-2">Hours</p>
            </div>
            <div class="text-center">
                <div class="countdown-digit" id="minutes">00</div>
                <p class="text-sm text-blue-300 uppercase tracking-widest mt-2">Minutes</p>
            </div>
            <div class="text-center">
                <div class="countdown-digit" id="seconds">00</div>
                <p class="text-sm text-blue-300 uppercase tracking-widest mt-2">Seconds</p>
            </div>
        </div>

        <!-- Email Signup Form -->
        <form id="signupForm" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-12">
            <input 
                type="email" 
                id="email" 
                placeholder="Enter your email" 
                required
                class="flex-1 px-6 py-4 bg-white/10 border border-blue-400/30 rounded-lg text-white placeholder-blue-300/50 transition-all duration-300"
            >
            <button 
                type="submit"
                class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-all duration-300 whitespace-nowrap"
            >
                Notify Me
            </button>
        </form>

        <!-- Success Message -->
        <div id="successMessage" class="hidden text-green-400 text-sm font-medium mb-8">
            ✓ Thanks! We'll notify you when we launch.
        </div>

        <!-- Footer Links -->
        <div class="flex justify-center gap-6 text-blue-300 text-sm">
            <a href="#" class="hover:text-blue-200 transition-colors">Twitter</a>
            <span class="text-blue-500/30">•</span>
            <a href="#" class="hover:text-blue-200 transition-colors">Instagram</a>
            <span class="text-blue-500/30">•</span>
            <a href="#" class="hover:text-blue-200 transition-colors">Discord</a>
        </div>
    </div>

    
  <script src="script.js"></script>
</body>
</html>
